<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Quotes1</title>

<style>
html, body{
    margin:0;
    width:100%;
    height:100%;
    background:transparent;
    overflow:hidden;
}

img{
    width:100%;
    height:100%;
    object-fit:contain;
}
</style>

</head>

<body>

<img id="quote">

<script>

const images = [
"001.jpg",
"002.png",
"003.jpg"
];

const randomImage = images[Math.floor(Math.random() * images.length)];

document.getElementById("quote").src =
"images/" + encodeURIComponent(randomImage);

</script>

</body>
</html>
